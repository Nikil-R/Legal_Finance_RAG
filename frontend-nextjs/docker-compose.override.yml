version: '3.8'

services:
  # Backend (existing - keep unchanged)
  backend:
    container_name: legal-finance-api
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      - ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - API_BASE_URL=http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    networks:
      - legal-finance
    depends_on:
      - chroma_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Chroma Vector Database
  chroma_db:
    container_name: chroma-db
    image: ghcr.io/chroma-core/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - ./chroma_db:/chroma/chroma_data
    networks:
      - legal-finance
    environment:
      - IS_PERSISTENT=TRUE

  # Frontend (new Next.js app)
  frontend:
    container_name: legal-finance-frontend
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - legal-finance
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  legal-finance:
    driver: bridge

volumes:
  chroma_data:
  data:
