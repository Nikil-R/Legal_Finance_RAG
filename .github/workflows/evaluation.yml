name: Evaluation

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain to evaluate (tax, finance, legal, or all)'
        required: false
        default: 'all'
      limit:
        description: 'Limit number of questions'
        required: false
        default: ''

jobs:
  evaluate:
    name: Run Evaluation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run document ingestion
        run: |
          python -m app.ingestion.cli --clear
      
      - name: Run evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -m evaluation.runner \
            --ci \
            ${{ github.event.inputs.domain && format('--domain {0}', github.event.inputs.domain) || '' }} \
            ${{ github.event.inputs.limit && format('--limit {0}', github.event.inputs.limit) || '' }}
      
      - name: Upload evaluation report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: evaluation-report
          path: evaluation/reports/
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reports = fs.readdirSync('evaluation/reports');
            const latestReport = reports.filter(f => f.endsWith('.txt')).sort().pop();
            if (latestReport) {
              const content = fs.readFileSync(`evaluation/reports/${latestReport}`, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## Evaluation Report\n\n```\n' + content.slice(0, 5000) + '\n```'
              });
            }
